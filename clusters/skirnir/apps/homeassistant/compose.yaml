# Homepage dashboard
# Uses variables from Mímir's Well: clusters/skirnir/mimir.env.example

name: homepage

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v0.9.13
    container_name: homepage
    restart: unless-stopped

    environment:
      - TZ=${TZ}

    volumes:
      # Config lives in Git; mounted read-only
      - ./config:/app/config:ro
      # Give Homepage read-only access to Docker for status widgets (optional but useful)
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}