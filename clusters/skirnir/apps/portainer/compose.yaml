# Portainer (observability)
# Uses variables from Mímir's Well: clusters/skirnir/mimir.env.example

name: portainer

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped

    environment:
      - TZ=${TZ}

    # Portainer needs access to Docker to observe containers, logs, etc.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_DATA}/portainer/data:/data

    networks:
      - proxy

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}