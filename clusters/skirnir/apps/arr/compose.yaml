# arr stack
# Uses variables from Mímir's Well: clusters/skirnir/mimir.env.example

name: arr

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${DOCKER_DATA}/arr/prowlarr/config:/config
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${DOCKER_DATA}/arr/sonarr/config:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4.10291-ls294
    container_name: radarr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${DOCKER_DATA}/arr/radarr/config:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${DOCKER_DATA}/arr/bazarr/config:/config
      - ${MEDIA_PATH}:/media
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r2-ls443
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - WEBUI_PORT=8080
    volumes:
      - ${DOCKER_DATA}/arr/qbittorrent/config:/config
      - ${DOWNLOADS_PATH}:/downloads
    ports:
      # Torrent traffic (needed; reverse proxy can't handle this)
      - "6881:6881/tcp"
      - "6881:6881/udp"
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}