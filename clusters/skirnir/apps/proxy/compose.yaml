name: proxy

services:
  caddy:
    image: caddy:2.8.4
    container_name: caddy
    restart: unless-stopped

    # Later we’ll supply env via .env (copied from mimir.env.example)
    environment:
      - TZ=${TZ}
      - DOMAIN=${DOMAIN}
      - JELLYFIN_HOST=${JELLYFIN_HOST}
      - PAPERLESS_HOST=${PAPERLESS_HOST}
      - HOMEASSISTANT_HOST=${HOMEASSISTANT_HOST}
      - DNS_HOST=${DNS_HOST}
      - HOMEPAGE_HOST=${HOMEPAGE_HOST}
      - PORTAINER_HOST=${PORTAINER_HOST}
      - PROWLARR_HOST=${PROWLARR_HOST}
      - SONARR_HOST=${SONARR_HOST}
      - RADARR_HOST=${RADARR_HOST}
      - BAZARR_HOST=${BAZARR_HOST}
      - QBITTORRENT_HOST=${QBITTORRENT_HOST}
      - FLARESOLVERR_HOST=${FLARESOLVERR_HOST}

    ports:
      # HTTP only for now (LAN). We'll add HTTPS later if/when you want it.
      - "80:80"
      # Optional: if you later do local HTTPS with Caddy internal CA:
      # - "443:443"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ${DOCKER_DATA}/proxy/caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_DATA}/proxy/data:/data
      - ${DOCKER_DATA}/proxy/config:/config

    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}