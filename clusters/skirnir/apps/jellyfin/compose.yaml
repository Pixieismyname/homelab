# Jellyfin
# Uses variables from Mímir's Well: clusters/skirnir/mimir.env.example

name: jellyfin

services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.6
    container_name: jellyfin
    restart: unless-stopped

    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}

    volumes:
      - ${DOCKER_DATA}/jellyfin/config:/config
      - ${DOCKER_DATA}/jellyfin/cache:/cache
      - ${MEDIA_PATH}:/media:ro

    # No ports exposed: accessed via Caddy at jellyfin.${DOMAIN}
    networks:
      - proxy

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}